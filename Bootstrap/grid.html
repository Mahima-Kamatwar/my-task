<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>grid layouts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</head>
<body class="p-2">
<div class="container">
  <div class="row border border-2 border-dark">
    <div class="col-5 bg-primary text-white p-3">Column 1</div>
    <div class="col-6 bg-secondary text-white p-3">Column 2</div>
  </div>
  <hr>
  <div class="row border border-2 border-dark">
    <div class="col-2 bg-success text-white p-3">Col 3</div>
    <div class="col-6 bg-warning text-dark p-3">Col 4</div>
    <div class="col-3 bg-danger text-white p-3">Col 5</div>
  </div>
  <hr>
  <div class="row border border-2 border-dark">
    <div class="col-3 bg-info text-white p-3">1</div>
    <div class="col-4 bg-secondary text-white p-3">2</div>
    <div class="col-3 bg-info text-white p-3">3</div>
    <div class="col-4 bg-dark text-white p-3">4</div>
  </div>
  <hr>
  <div class="row border border-2 border-dark">
    <div class="col-md-4 col-12 bg-danger text-white p-3">1</div>
    <div class="col-md-4 col-12 bg-warning text-dark p-3">2</div>
    <div class="col-md-4 col-12 bg-success text-white p-3">3</div>
  </div><hr>
   <div class="row border border-2 border-dark">
    <div class="col-8 bg-light text-dark p-3 border border-black shadow-lg">container</div>
    <div class="col-4 bg-secondary text-white p-3">Slide</div>
  </div>
  <hr>
<div class="row border border-2 border-dark">
  <div class="col-8 bg-info">1 of 2</div>
  <div class="col-4 bg-secondary">2 of 2</div>
</div>

<hr>
<div class="row border border-4 border-dark">
  <div class="col-2 bg-danger">html</div>
  <div class="col-4 bg-warning">css</div>
  <div class="col-8 bg-success">Bootstrap</div>
  <div class="col-6 bg-primary">Java</div>
</div>
<hr>

<div class="row border border-4 border-dark">
  <div class="col-12 bg-dark text-white">col-12</div>
  <div class="col-9 bg-info">col-9</div>
  <div class="col-3 bg-white">col-3</div>
  <div class="col-6 bg-warning">col-6</div>
</div>
<hr></div>

</body>
</html>
